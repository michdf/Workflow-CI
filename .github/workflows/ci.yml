name: CI - Model Training

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install MLflow
        run: pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib

      - name: Run MLflow Project
        run: mlflow run MLProject/ -P n_estimators=10 -P min_samples_split=5 -P min_samples_leaf=1 --env-manager=local

      - name: Verify artifacts exist
        run: ls -la mlruns/

      - name: Upload model artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts
          path: mlruns/
          retention-days: 30

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get Run ID
        id: get_run
        run: |
          RUN_ID=$(python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          runs = client.search_runs(experiment_ids=['0'])
          print(runs[0].info.run_id)
          ")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Build Docker Image with MLflow
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.get_run.outputs.run_id }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/iris-mlops" \
            --env-manager=local

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/iris-mlops

      - name: Save Docker Hub link
        run: echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/iris-mlops" > MLProject/docker_hub_link.txt